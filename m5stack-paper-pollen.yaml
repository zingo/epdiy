esphome:
  name: m5paper-pollen
  friendly_name: M5Paper Pollen Display
  build_path: ./build/m5paper-pollen
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
  on_boot:
    priority: -100
    then:
      - it8951e.clear:
      - delay: 500ms
      - component.update: pollen_display
      - lambda: |-
          id(system_initialized) = true;

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: arduino

globals:
  - id: system_initialized
    type: bool
    restore_value: no
    initial_value: 'false'

psram:
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 115200
  logs:
    wifi: WARN
    esp-idf: WARN
    homeassistant: DEBUG
    api: DEBUG
    sensor: DEBUG

api:
  reboot_timeout: 6h
  services:
    - service: update_display
      then:
        - component.update: pollen_display

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 6h
  power_save_mode: LIGHT

external_components:
  - source: github://Passific/m5paper_esphome

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_internal
  frequency: 200kHz

# ============================================
# POLLEN SENSORS FROM HOME ASSISTANT
# ============================================
sensor:
  # Allergy risk
  - platform: homeassistant
    id: allergy_risk
    entity_id: sensor.polleninformation_lund_allergy_risk
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(system_initialized);'
            then:
              - component.update: pollen_display

  # Individual pollen types
  - platform: homeassistant
    id: pollen_alder
    entity_id: sensor.polleninformation_lund_alder
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(system_initialized);'
            then:
              - component.update: pollen_display

  - platform: homeassistant
    id: pollen_birch
    entity_id: sensor.polleninformation_lund_birch

  - platform: homeassistant
    id: pollen_hazel
    entity_id: sensor.polleninformation_lund_hazel

  - platform: homeassistant
    id: pollen_willow
    entity_id: sensor.polleninformation_lund_salg_och_viden

  - platform: homeassistant
    id: pollen_elm
    entity_id: sensor.polleninformation_lund_alm

  - platform: homeassistant
    id: pollen_grass
    entity_id: sensor.polleninformation_lund_grasses

  # Device sensors
  - platform: sht3xd
    address: 0x44
    temperature:
      name: "M5Paper Temperature"
      id: m5paper_temp
    humidity:
      name: "M5Paper Humidity"
      id: m5paper_humidity
    update_interval: 60s

  - platform: adc
    pin: GPIO35
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2.0

  - platform: wifi_signal
    name: "WiFi Signal"
    id: m5paper_wifi_signal
    update_interval: 60s

text_sensor:
  - platform: homeassistant
    id: allergy_risk_named
    entity_id: sensor.polleninformation_lund_allergy_risk
    attribute: named_state

  - platform: homeassistant
    id: pollen_alder_named
    entity_id: sensor.polleninformation_lund_alder
    attribute: named_state

  - platform: homeassistant
    id: pollen_birch_named
    entity_id: sensor.polleninformation_lund_birch
    attribute: named_state

  - platform: homeassistant
    id: pollen_hazel_named
    entity_id: sensor.polleninformation_lund_hazel
    attribute: named_state

  - platform: homeassistant
    id: pollen_willow_named
    entity_id: sensor.polleninformation_lund_salg_och_viden
    attribute: named_state

  - platform: homeassistant
    id: pollen_elm_named
    entity_id: sensor.polleninformation_lund_alm
    attribute: named_state

  - platform: homeassistant
    id: pollen_grass_named
    entity_id: sensor.polleninformation_lund_grasses
    attribute: named_state

  - platform: template
    name: "API Connection Status"
    id: api_status
    lambda: |-
      return api_is_connected() ? "connected" : "disconnected";

binary_sensor:
  - platform: gpio
    name: "Left Button"
    pin:
      number: GPIO37
      inverted: true
    on_press:
      - component.update: pollen_display
  - platform: gpio
    name: "Push Button"
    pin:
      number: GPIO38
      inverted: true
  - platform: gpio
    name: "Right Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      - component.update: pollen_display

# ============================================
# TIME SYNCHRONIZATION
# ============================================
time:
  - platform: bm8563
    id: rtc_time
    address: 0x51
    update_interval: never

  - platform: homeassistant
    id: ha_time
    timezone: Europe/Berlin
    update_interval: 1h
    on_time_sync:
      then:
        - bm8563.write_time:
            id: rtc_time

# ============================================
# DISPLAY UPDATE INTERVALS
# ============================================
interval:
  # Full display refresh every 6 hours (anti-ghosting)
  - interval: 6h
    then:
      - logger.log: "Full display refresh"
      - component.update: pollen_display

  # Periodic update for time display
  - interval: 1min
    then:
      - component.update: pollen_display

# ============================================
# HARDWARE COMPONENTS
# ============================================
m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

touchscreen:
  - platform: gt911
    display: pollen_display
    id: touch_panel
    calibration:
      x_min: 0
      x_max: 540
      y_min: 0
      y_max: 960
    on_touch:
      - lambda: |-
          ESP_LOGI("touch", "x=%d, y=%d", touch.x, touch.y);
      - component.update: pollen_display

# ============================================
# FONTS
# ============================================
font:
  - file: "gfonts://Roboto@700"
    id: font_large
    size: 80
    glyphsets: [GF_Latin_Core]

  - file: "gfonts://Roboto"
    id: font_medium
    size: 40
    glyphsets: [GF_Latin_Core]

  - file: "gfonts://Roboto"
    id: font_small
    size: 28
    glyphsets: [GF_Latin_Core]

  - file: "gfonts://Roboto"
    id: font_tiny
    size: 20
    glyphsets: [GF_Latin_Core]

# ============================================
# POLLEN DISPLAY
# ============================================
display:
  - platform: it8951e
    id: pollen_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 90
    reversed: false
    update_interval: never
    auto_clear_enabled: true
    sleep_when_done: false
    lambda: |-
      // Screen dimensions (after 90° rotation)
      #define SCREEN_W 540
      #define SCREEN_H 960

      // Pollen level colors (grayscale values)
      #define LEVEL_NONE 255      // White
      #define LEVEL_LOW 221       // Light gray
      #define LEVEL_MODERATE 136  // Gray
      #define LEVEL_HIGH 68       // Dark gray
      #define LEVEL_VERY_HIGH 0   // Black

      // Helper function to get color for pollen level
      auto get_level_color = [](int level) -> Color {
        int gray;
        switch(level) {
          case 0: gray = LEVEL_NONE; break;
          case 1: gray = LEVEL_LOW; break;
          case 2: gray = LEVEL_MODERATE; break;
          case 3: gray = LEVEL_HIGH; break;
          case 4: gray = LEVEL_VERY_HIGH; break;
          default: gray = LEVEL_NONE; break;
        }
        return Color(gray, gray, gray);
      };

      // Helper function to get Swedish level name
      auto get_level_name = [](int level) -> std::string {
        switch(level) {
          case 0: return "ingen";
          case 1: return "låg";
          case 2: return "måttlig";
          case 3: return "hög";
          case 4: return "mycket hög";
          default: return "okänd";
        }
      };

      // ========================================
      // HEADER: DATE & TIME
      // ========================================
      it.strftime(SCREEN_W/2, 30, id(font_small), TextAlign::TOP_CENTER,
                  "%A, %d. %B %Y", id(rtc_time).now());

      it.strftime(SCREEN_W/2, 80, id(font_large), TextAlign::TOP_CENTER,
                  "%H:%M", id(rtc_time).now());

      // Separator line
      it.line(40, 180, SCREEN_W-40, 180);

      // ========================================
      // ALLERGY RISK LEVEL
      // ========================================
      it.printf(SCREEN_W/2, 210, id(font_medium), TextAlign::TOP_CENTER,
                "Allergirisk");

      if (id(allergy_risk_named).has_state()) {
        std::string risk_name = id(allergy_risk_named).state;
        
        // Draw VU meter for risk level
        int risk_bar_x = SCREEN_W/2 - 42;
        int risk_bar_y = 260;
        int risk_seg_w = 20;
        int risk_seg_h = 40;
        int risk_gap = 4;
        
        // Convert name to level
        int risk_level = 0;
        if (risk_name == "låg") risk_level = 1;
        else if (risk_name == "måttlig") risk_level = 2;
        else if (risk_name == "hög") risk_level = 3;
        else if (risk_name == "mycket hög") risk_level = 4;
        
        for (int i = 0; i < 4; i++) {
          int seg_x = risk_bar_x + i * (risk_seg_w + risk_gap);
          it.rectangle(seg_x, risk_bar_y, risk_seg_w, risk_seg_h, Color(0, 0, 0));
          if (i < risk_level) {
            it.filled_rectangle(seg_x + 2, risk_bar_y + 2, risk_seg_w - 4, risk_seg_h - 4, Color(0, 0, 0));
          }
        }
        
        // Draw text below
        it.printf(SCREEN_W/2, risk_bar_y + risk_seg_h + 10, id(font_small), TextAlign::TOP_CENTER,
                  "%s", risk_name.c_str());
      }

      // Separator line
      it.line(40, 350, SCREEN_W-40, 350);

      // ========================================
      // POLLEN TYPES (2 columns) - VU Meter Style
      // ========================================
      int col1_x = 20;
      int col2_x = 275;
      int bar_x = 140;
      int bar_seg_w = 14;
      int bar_seg_h = 22;
      int bar_gap = 2;
      int row_y = 380;
      int row_spacing = 70;

      // Convert Swedish level name to number
      auto level_from_name = [](const std::string& name) -> int {
        if (name == "ingen") return 0;
        if (name == "låg") return 1;
        if (name == "måttlig") return 2;
        if (name == "hög") return 3;
        if (name == "mycket hög") return 4;
        return 0;
      };

      // Draw VU meter bar for a pollen level
      auto draw_vu_bar = [&](int x, int y, int level, const std::string& name) {
        for (int i = 0; i < 4; i++) {
          int seg_x = x + i * (bar_seg_w + bar_gap);
          if (i < level) {
            // Filled segment: black outline, white fill
            it.rectangle(seg_x, y, bar_seg_w, bar_seg_h, Color(0, 0, 0));
            it.filled_rectangle(seg_x + 1, y + 1, bar_seg_w - 2, bar_seg_h - 2, Color(255, 255, 255));
          } else {
            // Empty segment: white outline, black fill
            it.rectangle(seg_x, y, bar_seg_w, bar_seg_h, Color(255, 255, 255));
            it.filled_rectangle(seg_x + 1, y + 1, bar_seg_w - 2, bar_seg_h - 2, Color(0, 0, 0));
          }
        }
        it.printf(x + 4 * (bar_seg_w + bar_gap) + 5, y + 4, id(font_tiny), TextAlign::TOP_LEFT, "%s", name.c_str());
      };

      // Column 1
      it.printf(col1_x, row_y, id(font_small), TextAlign::TOP_LEFT, "Al (Alder):");
      if (id(pollen_alder_named).has_state()) {
        std::string name = id(pollen_alder_named).state;
        int level = level_from_name(name);
        draw_vu_bar(col1_x + bar_x, row_y, level, name);
      }

      it.printf(col1_x, row_y + row_spacing, id(font_small), TextAlign::TOP_LEFT, "Björk:");
      if (id(pollen_birch_named).has_state()) {
        std::string name = id(pollen_birch_named).state;
        int level = level_from_name(name);
        draw_vu_bar(col1_x + bar_x, row_y + row_spacing, level, name);
      }

      it.printf(col1_x, row_y + 2*row_spacing, id(font_small), TextAlign::TOP_LEFT, "Hassel:");
      if (id(pollen_hazel_named).has_state()) {
        std::string name = id(pollen_hazel_named).state;
        int level = level_from_name(name);
        draw_vu_bar(col1_x + bar_x, row_y + 2*row_spacing, level, name);
      }

      // Column 2
      it.printf(col2_x, row_y, id(font_small), TextAlign::TOP_LEFT, "Sälg/Vide:");
      if (id(pollen_willow_named).has_state()) {
        std::string name = id(pollen_willow_named).state;
        int level = level_from_name(name);
        draw_vu_bar(col2_x + bar_x, row_y, level, name);
      }

      it.printf(col2_x, row_y + row_spacing, id(font_small), TextAlign::TOP_LEFT, "Alm:");
      if (id(pollen_elm_named).has_state()) {
        std::string name = id(pollen_elm_named).state;
        int level = level_from_name(name);
        draw_vu_bar(col2_x + bar_x, row_y + row_spacing, level, name);
      }

      it.printf(col2_x, row_y + 2*row_spacing, id(font_small), TextAlign::TOP_LEFT, "Gräs:");
      if (id(pollen_grass_named).has_state()) {
        std::string name = id(pollen_grass_named).state;
        int level = level_from_name(name);
        draw_vu_bar(col2_x + bar_x, row_y + 2*row_spacing, level, name);
      }

      // Separator line
      it.line(40, 600, SCREEN_W-40, 600);

      // ========================================
      // LEGEND - VU Meter Style
      // ========================================
      int legend_y = 620;
      int legend_x = 30;
      int leg_seg_w = 18;
      int leg_seg_h = 25;
      int leg_gap = 3;
      int leg_spacing = 100;

      it.printf(legend_x, legend_y, id(font_tiny), TextAlign::TOP_LEFT, "Skala:");

      // Draw legend VU bars
      auto draw_legend_bar = [&](int x, int y, int level, const char* name) {
        for (int i = 0; i < 4; i++) {
          int seg_x = x + i * (leg_seg_w + leg_gap);
          if (i < level) {
            // Filled segment: black outline, white fill
            it.rectangle(seg_x, y, leg_seg_w, leg_seg_h, Color(0, 0, 0));
            it.filled_rectangle(seg_x + 1, y + 1, leg_seg_w - 2, leg_seg_h - 2, Color(255, 255, 255));
          } else {
            // Empty segment: white outline, black fill
            it.rectangle(seg_x, y, leg_seg_w, leg_seg_h, Color(255, 255, 255));
            it.filled_rectangle(seg_x + 1, y + 1, leg_seg_w - 2, leg_seg_h - 2, Color(0, 0, 0));
          }
        }
        it.printf(x + 4 * (leg_seg_w + leg_gap) / 2, y + leg_seg_h + 5, id(font_tiny), TextAlign::TOP_CENTER, "%s", name);
      };

      draw_legend_bar(legend_x, legend_y + 30, 0, "ingen");
      draw_legend_bar(legend_x + leg_spacing, legend_y + 30, 1, "låg");
      draw_legend_bar(legend_x + 2*leg_spacing, legend_y + 30, 2, "måttlig");
      draw_legend_bar(legend_x + 3*leg_spacing, legend_y + 30, 3, "hög");
      draw_legend_bar(legend_x + 4*leg_spacing, legend_y + 30, 4, "mycket hög");

      // ========================================
      // FOOTER: BATTERY & STATUS
      // ========================================
      int footer_y = SCREEN_H - 60;

      // Battery voltage
      if (id(battery_voltage).has_state()) {
        float battery_v = id(battery_voltage).state;

        it.printf(40, footer_y, id(font_tiny), TextAlign::BOTTOM_LEFT,
                  "Bat: %.2fV", battery_v);

        // Battery percentage (rough estimate for LiPo)
        float percent = (battery_v - 3.3) / (4.2 - 3.3) * 100.0;
        percent = max(0.0f, min(100.0f, percent));
        it.printf(40, footer_y+30, id(font_tiny), TextAlign::BOTTOM_LEFT,
                  "%.0f%%", percent);
      }

      // WiFi status
      it.printf(SCREEN_W/2, footer_y, id(font_tiny), TextAlign::BOTTOM_CENTER,
                "WiFi: %s", id(api_status).state.c_str());

      // Last update
      it.strftime(SCREEN_W-40, footer_y, id(font_tiny), TextAlign::BOTTOM_RIGHT,
                  "Last: %H:%M", id(rtc_time).now());

      // Device temperature
      if (id(m5paper_temp).has_state()) {
        it.printf(SCREEN_W-40, footer_y+30, id(font_tiny), TextAlign::BOTTOM_RIGHT,
                  "Dev: %.1f°C", id(m5paper_temp).state);
      }
