esphome:
  name: m5paper-combined
  friendly_name: M5Paper Combined Display
  build_path: ./build/m5paper-combined
  includes:
    - weather_icons.h
    - pollen_forecast.h
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    lib_deps:
      - bblanchon/ArduinoJson@^6.21.0
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Enable ext1 wakeup for GPIO37, 38, 39 (buttons)
          uint64_t wakeup_mask = (1ULL << 37) | (1ULL << 38) | (1ULL << 39);
          esp_sleep_enable_ext1_wakeup(wakeup_mask, ESP_EXT1_WAKEUP_ALL_LOW);
      - it8951e.clear:
      - delay: 500ms
      - component.update: main_display
      - lambda: |-
          id(system_initialized) = true;
      - script.execute: enter_deep_sleep

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: arduino

globals:
  - id: system_initialized
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: prevent_sleep
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: api_ready
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: enter_deep_sleep
    then:
      - wait_until:
          condition:
            lambda: 'return id(api_ready);'
          timeout: 30s
      - delay: 10s
      - component.update: main_display
      - delay: 2s
      - if:
          condition:
            lambda: 'return !id(prevent_sleep);'
          then:
            - logger.log: "Entering deep sleep"
            - deep_sleep.enter:
                id: deep_sleep_1

psram:
  speed: 80MHz

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 10min

logger:
  level: WARN
  baud_rate: 115200
  logs:
    wifi: WARN
    esp-idf: WARN
    homeassistant: WARN
    api: WARN
    sensor: WARN

api:
  reboot_timeout: 6h
  on_client_connected:
    then:
      - lambda: 'id(api_ready) = true;'
      - logger.log: "API connected"
  services:
    - service: update_display
      then:
        - component.update: main_display
    - service: set_page
      variables:
        page: int
      then:
        - lambda: |-
            id(current_page) = page % 3;
        - component.update: main_display

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 6h
  power_save_mode: LIGHT
  on_connect:
    then:
      - logger.log: "WiFi connected"

external_components:
  - source: github://Passific/m5paper_esphome

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_internal
  frequency: 200kHz

# ============================================
# WEATHER SENSORS FROM HOME ASSISTANT
# ============================================
sensor:
  - platform: homeassistant
    id: weather_temperature
    entity_id: sensor.openweathermap_temperatur
    on_value:
      then:
        - text_sensor.template.publish:
            id: weather_last_received
            state: !lambda |-
              auto time = id(rtc_time).now();
              char buf[32];
              sprintf(buf, "%02d:%02d %02d/%02d", time.hour, time.minute, time.day_of_month, time.month);
              return std::string(buf);

  - platform: homeassistant
    id: weather_humidity
    entity_id: sensor.openweathermap_luftfuktighet

  - platform: homeassistant
    id: weather_pressure
    entity_id: sensor.openweathermap_tryck

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: sensor.openweathermap_vindhastighet

  - platform: homeassistant
    id: weather_feels_like
    entity_id: sensor.openweathermap_skenbar_temperatur

  - platform: homeassistant
    id: weather_uv_index
    entity_id: sensor.openweathermap_uv_index

  - platform: homeassistant
    id: weather_cloud_coverage
    entity_id: sensor.openweathermap_molntackning

  # Pollen sensors
  - platform: homeassistant
    id: allergy_risk
    entity_id: sensor.polleninformation_lund_allergy_risk

  - platform: homeassistant
    id: pollen_alder
    entity_id: sensor.polleninformation_lund_alder

  - platform: homeassistant
    id: pollen_birch
    entity_id: sensor.polleninformation_lund_birch

  - platform: homeassistant
    id: pollen_hazel
    entity_id: sensor.polleninformation_lund_hazel

  - platform: homeassistant
    id: pollen_willow
    entity_id: sensor.polleninformation_lund_salg_och_viden

  - platform: homeassistant
    id: pollen_elm
    entity_id: sensor.polleninformation_lund_alm

  - platform: homeassistant
    id: pollen_grass
    entity_id: sensor.polleninformation_lund_grasses

  # Device sensors
  - platform: sht3xd
    address: 0x44
    temperature:
      name: "M5Paper Temperature"
      id: m5paper_temp
    humidity:
      name: "M5Paper Humidity"
      id: m5paper_humidity
    update_interval: 300s

  - platform: adc
    pin: GPIO35
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 300s
    attenuation: 12db
    filters:
      - multiply: 2.0

  - platform: wifi_signal
    name: "WiFi Signal"
    id: m5paper_wifi_signal
    update_interval: 300s

text_sensor:
  # Weather text sensors
  - platform: homeassistant
    id: weather_condition
    entity_id: sensor.openweathermap_skick

  # Pollen text sensors
  - platform: homeassistant
    id: allergy_risk_named
    entity_id: sensor.polleninformation_lund_allergy_risk
    attribute: named_state

  - platform: homeassistant
    id: pollen_alder_named
    entity_id: sensor.polleninformation_lund_alder
    attribute: named_state

  - platform: homeassistant
    id: pollen_birch_named
    entity_id: sensor.polleninformation_lund_birch
    attribute: named_state

  - platform: homeassistant
    id: pollen_hazel_named
    entity_id: sensor.polleninformation_lund_hazel
    attribute: named_state

  - platform: homeassistant
    id: pollen_willow_named
    entity_id: sensor.polleninformation_lund_salg_och_viden
    attribute: named_state

  - platform: homeassistant
    id: pollen_elm_named
    entity_id: sensor.polleninformation_lund_alm
    attribute: named_state

  - platform: homeassistant
    id: pollen_grass_named
    entity_id: sensor.polleninformation_lund_grasses
    attribute: named_state

  # Forecast sensors for Björk and Gräs
  - platform: homeassistant
    id: pollen_birch_forecast
    entity_id: sensor.polleninformation_lund_birch
    attribute: forecast

  - platform: homeassistant
    id: pollen_grass_forecast
    entity_id: sensor.polleninformation_lund_grasses
    attribute: forecast

  # Numeric state sensors
  - platform: homeassistant
    id: pollen_birch_numeric
    entity_id: sensor.polleninformation_lund_birch
    attribute: numeric_state

  - platform: homeassistant
    id: pollen_grass_numeric
    entity_id: sensor.polleninformation_lund_grasses
    attribute: numeric_state

  - platform: template
    name: "API Connection Status"
    id: api_status
    lambda: |-
      return api_is_connected() ? "connected" : "disconnected";

  - platform: template
    id: weather_last_received

  # Last updated timestamps
  - platform: homeassistant
    id: pollen_last_updated
    entity_id: sensor.polleninformation_lund_allergy_risk
    attribute: last_updated

binary_sensor:
  - platform: gpio
    name: "Left Button"
    pin:
      number: GPIO37
      inverted: true
    on_press:
      - lambda: |-
          id(prevent_sleep) = true;
          id(current_page) = (id(current_page) - 1 + 3) % 3;
      - component.update: main_display
      - delay: 30s
      - lambda: 'id(prevent_sleep) = false;'

  - platform: gpio
    name: "Middle Button"
    pin:
      number: GPIO38
      inverted: true
    on_press:
      - lambda: 'id(prevent_sleep) = true;'
      - component.update: main_display
      - delay: 30s
      - lambda: 'id(prevent_sleep) = false;'

  - platform: gpio
    name: "Right Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      - lambda: |-
          id(prevent_sleep) = true;
          id(current_page) = (id(current_page) + 1) % 3;
      - component.update: main_display
      - delay: 30s
      - lambda: 'id(prevent_sleep) = false;'

# ============================================
# TIME SYNCHRONIZATION
# ============================================
time:
  - platform: bm8563
    id: rtc_time
    address: 0x51
    update_interval: never

  - platform: homeassistant
    id: ha_time
    timezone: Europe/Berlin
    update_interval: 1h
    on_time_sync:
      then:
        - bm8563.write_time:
            id: rtc_time

# ============================================
# DISPLAY UPDATE INTERVALS
# ============================================
interval:
  - interval: 6h
    then:
      - logger.log: "Full display refresh"
      - component.update: main_display
      - script.execute: enter_deep_sleep

  - interval: 10min
    then:
      - component.update: main_display
      - script.execute: enter_deep_sleep

# ============================================
# HARDWARE COMPONENTS
# ============================================
m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

touchscreen:
  - platform: gt911
    display: main_display
    id: touch_panel
    calibration:
      x_min: 0
      x_max: 540
      y_min: 0
      y_max: 960
    on_touch:
      - lambda: |-
          ESP_LOGI("touch", "x=%d, y=%d", touch.x, touch.y);
      - component.update: main_display

# ============================================
# FONTS
# ============================================
font:
  - file: "gfonts://Roboto@700"
    id: font_large
    size: 120
    glyphsets: [GF_Latin_Core]

  - file: "gfonts://Roboto"
    id: font_medium
    size: 48
    glyphsets: [GF_Latin_Core]

  - file: "gfonts://Roboto"
    id: font_small
    size: 32
    glyphsets: [GF_Latin_Core]

  - file: "gfonts://Roboto"
    id: font_tiny
    size: 24
    glyphsets: [GF_Latin_Core]

# ============================================
# COMBINED DISPLAY
# ============================================
display:
  - platform: it8951e
    id: main_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 90
    reversed: false
    update_interval: never
    auto_clear_enabled: true
    sleep_when_done: true
    lambda: |-
      // Screen dimensions (after 90° rotation)
      #define SCREEN_W 540
      #define SCREEN_H 960

      // Colors
      #define BLACK 0x00
      #define WHITE 0xFF

      int page = id(current_page);

      // ========================================
      // COMMON HEADER: DATE & TIME
      // ========================================
      it.strftime(SCREEN_W/2, 30, id(font_small), TextAlign::TOP_CENTER,
                  "%A, %d. %B %Y", id(rtc_time).now());

      it.strftime(SCREEN_W/2, 85, id(font_large), TextAlign::TOP_CENTER,
                  "%H:%M", id(rtc_time).now());

      // Page indicator
      it.printf(SCREEN_W - 50, 30, id(font_tiny), TextAlign::TOP_RIGHT,
                "%d/3", page + 1);

      // ========================================
      // PAGE 0: WEATHER
      // ========================================
      if (page == 0) {
        it.line(40, 220, SCREEN_W-40, 220);

        // Weather icon selection
        const uint8_t* weather_icon_data = nullptr;
        uint32_t icon_width = 0;
        uint32_t icon_height = 0;

        std::string condition = id(weather_condition).state;
        ESP_LOGD("weather", "Weather condition: %s", condition.c_str());

        if (condition == "sunny" || condition == "clear") {
          weather_icon_data = weather_sunny_data;
          icon_width = weather_sunny_width;
          icon_height = weather_sunny_height;
        }
        else if (condition == "clear-night") {
          weather_icon_data = weather_clear_night_data;
          icon_width = weather_clear_night_width;
          icon_height = weather_clear_night_height;
        }
        else if (condition == "cloudy") {
          weather_icon_data = weather_cloudy_data;
          icon_width = weather_cloudy_width;
          icon_height = weather_cloudy_height;
        }
        else if (condition == "partlycloudy") {
          weather_icon_data = weather_partlycloudy_data;
          icon_width = weather_partlycloudy_width;
          icon_height = weather_partlycloudy_height;
        }
        else if (condition == "rainy" || condition == "rain") {
          weather_icon_data = weather_rainy_data;
          icon_width = weather_rainy_width;
          icon_height = weather_rainy_height;
        }
        else if (condition == "pouring") {
          weather_icon_data = weather_pouring_data;
          icon_width = weather_pouring_width;
          icon_height = weather_pouring_height;
        }
        else if (condition == "snowy" || condition == "snow") {
          weather_icon_data = weather_snowy_data;
          icon_width = weather_snowy_width;
          icon_height = weather_snowy_height;
        }
        else if (condition == "fog" || condition == "foggy") {
          weather_icon_data = weather_fog_data;
          icon_width = weather_fog_width;
          icon_height = weather_fog_height;
        }
        else if (condition == "windy") {
          weather_icon_data = weather_windy_data;
          icon_width = weather_windy_width;
          icon_height = weather_windy_height;
        }
        else if (condition == "hail") {
          weather_icon_data = weather_hail_data;
          icon_width = weather_hail_width;
          icon_height = weather_hail_height;
        }
        else if (condition == "lightning" || condition == "lightning-rainy") {
          weather_icon_data = weather_lightning_data;
          icon_width = weather_lightning_width;
          icon_height = weather_lightning_height;
        }

        // Draw weather icon
        if (weather_icon_data != nullptr && icon_width > 0 && icon_height > 0) {
          int icon_x = (SCREEN_W/2)-(icon_width/2);
          int icon_y = 230;
          
          for (uint32_t y = 0; y < icon_height; y++) {
            for (uint32_t x = 0; x < icon_width; x += 2) {
              uint32_t src_byte_index = (y * icon_width + x) / 2;
              uint8_t src_byte = weather_icon_data[src_byte_index];
              
              uint8_t pixel1 = (src_byte >> 4) & 0x0F;
              uint8_t pixel2 = src_byte & 0x0F;
              
              uint8_t gray1 = (15 - pixel1) * 17;
              uint8_t gray2 = (15 - pixel2) * 17;
              
              it.draw_pixel_at(icon_x + x, icon_y + y, Color(gray1, gray1, gray1));
              if (x + 1 < icon_width) {
                it.draw_pixel_at(icon_x + x + 1, icon_y + y, Color(gray2, gray2, gray2));
              }
            }
          }
        }

        // Weather condition text
        it.printf(SCREEN_W/2, 370, id(font_medium), TextAlign::TOP_CENTER,
                  "%s", condition.c_str());

        // Main temperature
        if (id(weather_temperature).has_state()) {
          it.printf(SCREEN_W/2, 500, id(font_large), TextAlign::CENTER,
                    "%.1f°C", id(weather_temperature).state);
        }

        // Details section
        int details_y = 570;
        int col_spacing = SCREEN_W / 3;

        it.printf(col_spacing/2, details_y, id(font_small), TextAlign::TOP_CENTER, "Humidity");
        if (id(weather_humidity).has_state()) {
          it.printf(col_spacing/2, details_y+40, id(font_medium), TextAlign::TOP_CENTER,
                    "%.0f%%", id(weather_humidity).state);
        }

        it.printf(SCREEN_W/2, details_y, id(font_small), TextAlign::TOP_CENTER, "Feels like");
        if (id(weather_feels_like).has_state()) {
          it.printf(SCREEN_W/2, details_y+40, id(font_medium), TextAlign::TOP_CENTER,
                    "%.1f°C", id(weather_feels_like).state);
        }

        it.printf(SCREEN_W-col_spacing/2, details_y, id(font_small), TextAlign::TOP_CENTER, "Pressure");
        if (id(weather_pressure).has_state()) {
          it.printf(SCREEN_W-col_spacing/2, details_y+40, id(font_medium), TextAlign::TOP_CENTER,
                    "%.0f", id(weather_pressure).state);
          it.printf(SCREEN_W-col_spacing/2, details_y+90, id(font_small), TextAlign::TOP_CENTER, "hPa");
        }

        // Wind & UV
        int extra_y = 700;
        if (id(weather_wind_speed).has_state()) {
          it.printf(SCREEN_W/3, extra_y, id(font_small), TextAlign::TOP_CENTER,
                    "Wind: %.1f km/h", id(weather_wind_speed).state);
        }
        if (id(weather_uv_index).has_state()) {
          it.printf(2*SCREEN_W/3, extra_y, id(font_small), TextAlign::TOP_CENTER,
                    "UV: %.1f", id(weather_uv_index).state);
        }
        if (id(weather_cloud_coverage).has_state()) {
          it.printf(SCREEN_W/2, extra_y+40, id(font_small), TextAlign::TOP_CENTER,
                    "Cloudiness: %.0f%%", id(weather_cloud_coverage).state);
        }

        // Pollen indicators for Björk and Gräs
        int pollen_y = 800;
        int pollen_seg_w = 20;
        int pollen_seg_h = 30;
        int pollen_gap = 4;

        auto level_from_name_pollen = [](const std::string& name) -> int {
          if (name == "ingen") return 0;
          if (name == "låg") return 1;
          if (name == "måttlig") return 2;
          if (name == "hög") return 3;
          if (name == "mycket hög") return 4;
          return 0;
        };

        auto draw_small_vu = [&](int x, int y, int level) {
          for (int i = 0; i < 4; i++) {
            int seg_x = x + i * (pollen_seg_w + pollen_gap);
            if (i < level) {
              it.rectangle(seg_x, y, pollen_seg_w, pollen_seg_h, Color(0, 0, 0));
              it.filled_rectangle(seg_x + 1, y + 1, pollen_seg_w - 2, pollen_seg_h - 2, Color(255, 255, 255));
            } else {
              it.rectangle(seg_x, y, pollen_seg_w, pollen_seg_h, Color(255, 255, 255));
              it.filled_rectangle(seg_x + 1, y + 1, pollen_seg_w - 2, pollen_seg_h - 2, Color(0, 0, 0));
            }
          }
        };

        // Björk - label at x=30, VU bar at x=160
        it.printf(30, pollen_y, id(font_small), TextAlign::TOP_LEFT, "Björk:");
        if (id(pollen_birch_named).has_state()) {
          draw_small_vu(160, pollen_y, level_from_name_pollen(id(pollen_birch_named).state));
        }

        // Gräs - label at x=280, VU bar at x=410
        it.printf(280, pollen_y, id(font_small), TextAlign::TOP_LEFT, "Gräs:");
        if (id(pollen_grass_named).has_state()) {
          draw_small_vu(410, pollen_y, level_from_name_pollen(id(pollen_grass_named).state));
        }
      }

      // ========================================
      // PAGE 1: FULL POLLEN
      // ========================================
      else if (page == 1) {
        it.line(40, 220, SCREEN_W-40, 220);

        // Allergy risk
        it.printf(SCREEN_W/2, 250, id(font_medium), TextAlign::TOP_CENTER, "Allergirisk");

        if (id(allergy_risk_named).has_state()) {
          std::string risk_name = id(allergy_risk_named).state;
          
          int risk_bar_x = SCREEN_W/2 - 42;
          int risk_bar_y = 300;
          int risk_seg_w = 20;
          int risk_seg_h = 40;
          int risk_gap = 4;
          
          int risk_level = 0;
          if (risk_name == "låg") risk_level = 1;
          else if (risk_name == "måttlig") risk_level = 2;
          else if (risk_name == "hög") risk_level = 3;
          else if (risk_name == "mycket hög") risk_level = 4;
          
          for (int i = 0; i < 4; i++) {
            int seg_x = risk_bar_x + i * (risk_seg_w + risk_gap);
            if (i < risk_level) {
              it.rectangle(seg_x, risk_bar_y, risk_seg_w, risk_seg_h, Color(0, 0, 0));
              it.filled_rectangle(seg_x + 1, risk_bar_y + 1, risk_seg_w - 2, risk_seg_h - 2, Color(255, 255, 255));
            } else {
              it.rectangle(seg_x, risk_bar_y, risk_seg_w, risk_seg_h, Color(255, 255, 255));
              it.filled_rectangle(seg_x + 1, risk_bar_y + 1, risk_seg_w - 2, risk_seg_h - 2, Color(0, 0, 0));
            }
          }
          
          it.printf(SCREEN_W/2, risk_bar_y + risk_seg_h + 10, id(font_small), TextAlign::TOP_CENTER,
                    "%s", risk_name.c_str());
        }

        it.line(40, 390, SCREEN_W-40, 390);

        // Pollen types - VU Meter Style
        int col1_x = 20;
        int col2_x = 275;
        int bar_x = 140;
        int bar_seg_w = 14;
        int bar_seg_h = 22;
        int bar_gap = 2;
        int row_y = 420;
        int row_spacing = 70;

        auto level_from_name = [](const std::string& name) -> int {
          if (name == "ingen") return 0;
          if (name == "låg") return 1;
          if (name == "måttlig") return 2;
          if (name == "hög") return 3;
          if (name == "mycket hög") return 4;
          return 0;
        };

        auto draw_vu_bar = [&](int x, int y, int level, const std::string& name) {
          for (int i = 0; i < 4; i++) {
            int seg_x = x + i * (bar_seg_w + bar_gap);
            if (i < level) {
              it.rectangle(seg_x, y, bar_seg_w, bar_seg_h, Color(0, 0, 0));
              it.filled_rectangle(seg_x + 1, y + 1, bar_seg_w - 2, bar_seg_h - 2, Color(255, 255, 255));
            } else {
              it.rectangle(seg_x, y, bar_seg_w, bar_seg_h, Color(255, 255, 255));
              it.filled_rectangle(seg_x + 1, y + 1, bar_seg_w - 2, bar_seg_h - 2, Color(0, 0, 0));
            }
          }
          it.printf(x + 4 * (bar_seg_w + bar_gap) + 5, y + 4, id(font_tiny), TextAlign::TOP_LEFT, "%s", name.c_str());
        };

        // Column 1
        it.printf(col1_x, row_y, id(font_small), TextAlign::TOP_LEFT, "Al (Alder):");
        if (id(pollen_alder_named).has_state()) {
          std::string name = id(pollen_alder_named).state;
          draw_vu_bar(col1_x + bar_x, row_y, level_from_name(name), name);
        }

        it.printf(col1_x, row_y + row_spacing, id(font_small), TextAlign::TOP_LEFT, "Björk:");
        if (id(pollen_birch_named).has_state()) {
          std::string name = id(pollen_birch_named).state;
          draw_vu_bar(col1_x + bar_x, row_y + row_spacing, level_from_name(name), name);
        }

        it.printf(col1_x, row_y + 2*row_spacing, id(font_small), TextAlign::TOP_LEFT, "Hassel:");
        if (id(pollen_hazel_named).has_state()) {
          std::string name = id(pollen_hazel_named).state;
          draw_vu_bar(col1_x + bar_x, row_y + 2*row_spacing, level_from_name(name), name);
        }

        // Column 2
        it.printf(col2_x, row_y, id(font_small), TextAlign::TOP_LEFT, "Sälg/Vide:");
        if (id(pollen_willow_named).has_state()) {
          std::string name = id(pollen_willow_named).state;
          draw_vu_bar(col2_x + bar_x, row_y, level_from_name(name), name);
        }

        it.printf(col2_x, row_y + row_spacing, id(font_small), TextAlign::TOP_LEFT, "Alm:");
        if (id(pollen_elm_named).has_state()) {
          std::string name = id(pollen_elm_named).state;
          draw_vu_bar(col2_x + bar_x, row_y + row_spacing, level_from_name(name), name);
        }

        it.printf(col2_x, row_y + 2*row_spacing, id(font_small), TextAlign::TOP_LEFT, "Gräs:");
        if (id(pollen_grass_named).has_state()) {
          std::string name = id(pollen_grass_named).state;
          draw_vu_bar(col2_x + bar_x, row_y + 2*row_spacing, level_from_name(name), name);
        }

        it.line(40, 640, SCREEN_W-40, 640);

        // Legend
        int legend_y = 770;
        int legend_x = 30;
        int leg_seg_w = 18;
        int leg_seg_h = 25;
        int leg_gap = 3;
        int leg_spacing = 100;

        it.printf(legend_x, legend_y, id(font_tiny), TextAlign::TOP_LEFT, "Skala:");

        auto draw_legend_bar = [&](int x, int y, int level, const char* name) {
          for (int i = 0; i < 4; i++) {
            int seg_x = x + i * (leg_seg_w + leg_gap);
            if (i < level) {
              it.rectangle(seg_x, y, leg_seg_w, leg_seg_h, Color(0, 0, 0));
              it.filled_rectangle(seg_x + 1, y + 1, leg_seg_w - 2, leg_seg_h - 2, Color(255, 255, 255));
            } else {
              it.rectangle(seg_x, y, leg_seg_w, leg_seg_h, Color(255, 255, 255));
              it.filled_rectangle(seg_x + 1, y + 1, leg_seg_w - 2, leg_seg_h - 2, Color(0, 0, 0));
            }
          }
          it.printf(x + 4 * (leg_seg_w + leg_gap) / 2, y + leg_seg_h + 5, id(font_tiny), TextAlign::TOP_CENTER, "%s", name);
        };

        draw_legend_bar(legend_x, legend_y + 30, 0, "ingen");
        draw_legend_bar(legend_x + leg_spacing, legend_y + 30, 1, "låg");
        draw_legend_bar(legend_x + 2*leg_spacing, legend_y + 30, 2, "måttlig");
        draw_legend_bar(legend_x + 3*leg_spacing, legend_y + 30, 3, "hög");
        draw_legend_bar(legend_x + 4*leg_spacing, legend_y + 30, 4, "mycket hög");
      }

      // ========================================
      // PAGE 2: DETAILED POLLEN (Björk & Gräs)
      // ========================================
      else if (page == 2) {
        it.line(40, 220, SCREEN_W-40, 220);

        auto level_from_name = [](const std::string& name) -> int {
          if (name == "ingen") return 0;
          if (name == "låg") return 1;
          if (name == "måttlig") return 2;
          if (name == "hög") return 3;
          if (name == "mycket hög") return 4;
          return 0;
        };

        // Get forecast levels
        int birch_levels[4] = {0, 0, 0, 0};
        int grass_levels[4] = {0, 0, 0, 0};
        
        if (id(pollen_birch_forecast).has_state()) {
          parse_forecast_levels(id(pollen_birch_forecast).state, birch_levels, 4);
        }
        if (id(pollen_grass_forecast).has_state()) {
          parse_forecast_levels(id(pollen_grass_forecast).state, grass_levels, 4);
        }

        // Draw a VU bar
        auto draw_vu_bar = [&](int x, int y, int level, int seg_w = 16, int seg_h = 24, int gap = 3) {
          for (int i = 0; i < 4; i++) {
            int seg_x = x + i * (seg_w + gap);
            if (i < level) {
              it.rectangle(seg_x, y, seg_w, seg_h, Color(0, 0, 0));
              it.filled_rectangle(seg_x + 1, y + 1, seg_w - 2, seg_h - 2, Color(255, 255, 255));
            } else {
              it.rectangle(seg_x, y, seg_w, seg_h, Color(255, 255, 255));
              it.filled_rectangle(seg_x + 1, y + 1, seg_w - 2, seg_h - 2, Color(0, 0, 0));
            }
          }
        };

        // Column layout for current levels
        int col1_x = 30;
        int col2_x = 290;
        int col_w = 220;

        // Header row with current levels
        int header_y = 250;
        it.printf(col1_x + col_w/2, header_y, id(font_medium), TextAlign::TOP_CENTER, "Björk");
        it.printf(col2_x + col_w/2, header_y, id(font_medium), TextAlign::TOP_CENTER, "Gräs");

        // Current level row (no "Just nu" text)
        int current_y = 310;
        if (id(pollen_birch_named).has_state()) {
          draw_vu_bar(col1_x + 60, current_y, level_from_name(id(pollen_birch_named).state), 22, 34, 5);
        }
        if (id(pollen_grass_named).has_state()) {
          draw_vu_bar(col2_x + 60, current_y, level_from_name(id(pollen_grass_named).state), 22, 34, 5);
        }

        // Separator
        it.line(40, 370, SCREEN_W-40, 370);

        // Rotated Forecast table - dates as rows, pollen as columns
        int table_y = 380;
        it.printf(SCREEN_W/2, table_y, id(font_medium), TextAlign::TOP_CENTER, "Prognos");

        // Column headers (Björk, Gräs)
        int col_header_y = table_y + 70;
        int bjork_col_x = 260;
        int gras_col_x = 400;
        it.printf(bjork_col_x, col_header_y, id(font_small), TextAlign::TOP_CENTER, "Björk");
        it.printf(gras_col_x, col_header_y, id(font_small), TextAlign::TOP_CENTER, "Gräs");

        // Horizontal line under headers
        it.line(40, col_header_y + 35, SCREEN_W-40, col_header_y + 35);

        // Date rows with forecast bars
        auto time_now = id(rtc_time).now();
        int row_h = 70;
        int fc_seg_w = 20;
        int fc_seg_h = 30;
        int fc_gap = 4;

        for (int d = 0; d < 4; d++) {
          int row_y = col_header_y + 50 + d * row_h;
          
          // Date label
          char date_str[20];
          if (d == 0) {
            sprintf(date_str, "Idag");
          } else if (d == 1) {
            sprintf(date_str, "Imorgon");
          } else {
            int day = time_now.day_of_month + d;
            int month = time_now.month;
            sprintf(date_str, "%d/%d", day, month);
          }
          it.printf(50, row_y + 5, id(font_small), TextAlign::TOP_LEFT, "%s", date_str);

          // Björk bar - use parsed forecast level
          draw_vu_bar(bjork_col_x - 45, row_y, birch_levels[d], fc_seg_w, fc_seg_h, fc_gap);
          
          // Gräs bar - use parsed forecast level
          draw_vu_bar(gras_col_x - 45, row_y, grass_levels[d], fc_seg_w, fc_seg_h, fc_gap);
        }

        // Legend at bottom
        int legend_y = 770;
        int legend_x = 30;
        int leg_seg_w = 18;
        int leg_seg_h = 25;
        int leg_gap = 3;
        int leg_spacing = 100;

        it.printf(legend_x, legend_y, id(font_tiny), TextAlign::TOP_LEFT, "Skala:");

        auto draw_legend_bar = [&](int x, int y, int level, const char* name) {
          for (int i = 0; i < 4; i++) {
            int seg_x = x + i * (leg_seg_w + leg_gap);
            if (i < level) {
              it.rectangle(seg_x, y, leg_seg_w, leg_seg_h, Color(0, 0, 0));
              it.filled_rectangle(seg_x + 1, y + 1, leg_seg_w - 2, leg_seg_h - 2, Color(255, 255, 255));
            } else {
              it.rectangle(seg_x, y, leg_seg_w, leg_seg_h, Color(255, 255, 255));
              it.filled_rectangle(seg_x + 1, y + 1, leg_seg_w - 2, leg_seg_h - 2, Color(0, 0, 0));
            }
          }
          it.printf(x + 4 * (leg_seg_w + leg_gap) / 2, y + leg_seg_h + 5, id(font_tiny), TextAlign::TOP_CENTER, "%s", name);
        };

        draw_legend_bar(legend_x, legend_y + 30, 0, "ingen");
        draw_legend_bar(legend_x + leg_spacing, legend_y + 30, 1, "låg");
        draw_legend_bar(legend_x + 2*leg_spacing, legend_y + 30, 2, "måttlig");
        draw_legend_bar(legend_x + 3*leg_spacing, legend_y + 30, 3, "hög");
        draw_legend_bar(legend_x + 4*leg_spacing, legend_y + 30, 4, "mycket hög");
      }

      // ========================================
      // COMMON FOOTER: BATTERY & STATUS
      // ========================================
      int footer_y = SCREEN_H - 60;

      // Battery percentage only
      if (id(battery_voltage).has_state()) {
        float battery_v = id(battery_voltage).state;
        float percent = (battery_v - 3.3) / (4.2 - 3.3) * 100.0;
        percent = max(0.0f, min(100.0f, percent));
        it.printf(20, footer_y, id(font_tiny), TextAlign::BOTTOM_LEFT,
                  "Batt: %.0f%%", percent);
      }

      it.printf(SCREEN_W/2, footer_y, id(font_tiny), TextAlign::BOTTOM_CENTER,
                "WiFi: %s", api_is_connected() ? "OK" : "--");

      if (id(m5paper_temp).has_state()) {
        it.printf(SCREEN_W-20, footer_y, id(font_tiny), TextAlign::BOTTOM_RIGHT,
                  "Inne: %.1f°C", id(m5paper_temp).state);
      }

      // Last updated times - format: extract HH:MM and DD/MM from ISO timestamp
      auto format_last = [](const std::string& iso) -> std::string {
        if (iso.length() < 16) return iso;
        std::string date = iso.substr(8, 2) + "/" + iso.substr(5, 2);
        std::string time = iso.substr(11, 5);
        return time + " " + date;
      };

      // Build complete last string
      std::string last_str = "Updated ";
      if (id(weather_last_received).has_state()) {
        last_str += "Weather:" + id(weather_last_received).state + " ";
      }
      if (id(pollen_last_updated).has_state()) {
        last_str += "Pollen:" + format_last(id(pollen_last_updated).state);
      }
      it.printf(20, footer_y + 30, id(font_tiny), TextAlign::BOTTOM_LEFT, "%s", last_str.c_str());
