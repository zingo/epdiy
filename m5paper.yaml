esphome:
  name: m5paper
  friendly_name: m5paper
  build_path: ./build/m5paper
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
  on_boot:
    - priority: 100
      then:
        - lambda: |-
            id(boot_time) = millis();
        - delay: 1s
    - priority: -100
      then:
        - it8951e.clear:
        - delay: 500ms
        - component.update: m5paper_display
        - lambda: |-
            id(system_initialized) = true;
            ESP_LOGI("m5paper", "System initialized, display ready");

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: arduino

globals:
  - id: system_initialized
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ha_message_counter
    type: int32_t
    restore_value: no
    initial_value: '-12'
  - id: boot_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

psram:
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 115200
  logs:
    i2c.idf: NONE

api:
  reboot_timeout: 6h
  on_client_connected:
    - lambda: |-
        ESP_LOGI("m5paper", "Home Assistant client connected");
  on_client_disconnected:
    - lambda: |-
        ESP_LOGI("m5paper", "Home Assistant client disconnected");

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 6h
  on_connect:
    - lambda: |-
        ESP_LOGI("m5paper", "WiFi connected");
  on_disconnect:
    - lambda: |-
        ESP_LOGI("m5paper", "WiFi disconnected");

external_components:
  - source: github://Passific/m5paper_esphome

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

i2c:
  sda: GPIO21
  scl: GPIO22

m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

interval:
  - interval: 10s
    then:
      - it8951e.updateslow: m5paper_display

display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 0
    reversed: false
    update_interval: never
    auto_clear_enabled: true
    sleep_when_done: false
    lambda: |-
       uint32_t uptime_sec = (millis() - id(boot_time)) / 1000;
       uint32_t uptime_min = uptime_sec / 60;
       uint32_t uptime_hr = uptime_min / 60;
       uptime_sec %= 60;
       uptime_min %= 60;
       
       it.printf(10, 10, id(RobotoSmall), TextAlign::TOP_LEFT, "Up: %02d:%02d:%02d", uptime_hr, uptime_min, uptime_sec);
       it.printf(10, 45, id(RobotoSmall), TextAlign::TOP_LEFT, "WiFi: %s", id(m5paper_wifi_signal).has_state() ? "OK" : "NO");
       it.printf(10, 80, id(RobotoSmall), TextAlign::TOP_LEFT, "HA: %s", id(api_status).state.c_str());
       it.printf(10, 115, id(RobotoSmall), TextAlign::TOP_LEFT, "Msg: %d", id(ha_message_counter));
       
       std::string line01 = id(textline01).state.substr(0, 20);
       std::string line02 = id(textline02).state.substr(0, 20);
       std::string line03 = id(textline03).state.substr(0, 20);
       std::string line04 = id(textline04).state.substr(0, 20);
       std::string line05 = id(textline05).state.substr(0, 20);
       std::string line06 = id(textline06).state.substr(0, 20);
       std::string line07 = id(textline07).state.substr(0, 20);
       std::string line08 = id(textline08).state.substr(0, 20);
       std::string line09 = id(textline09).state.substr(0, 20);
       std::string line10 = id(textline10).state.substr(0, 20);
       std::string line11 = id(textline11).state.substr(0, 20);
       std::string line12 = id(textline12).state.substr(0, 20);
       
       it.print(it.get_width() / 2, it.get_height() / 12 *1 , id(Roboto70), TextAlign::BOTTOM_CENTER, line01.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *2 , id(Roboto70), TextAlign::BOTTOM_CENTER, line02.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *3 , id(Roboto70), TextAlign::BOTTOM_CENTER, line03.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *4 , id(Roboto70), TextAlign::BOTTOM_CENTER, line04.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *5 , id(Roboto70), TextAlign::BOTTOM_CENTER, line05.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *6 , id(Roboto70), TextAlign::BOTTOM_CENTER, line06.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *7 , id(Roboto70), TextAlign::BOTTOM_CENTER, line07.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *8 , id(Roboto70), TextAlign::BOTTOM_CENTER, line08.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *9 , id(Roboto70), TextAlign::BOTTOM_CENTER, line09.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *10 , id(Roboto70), TextAlign::BOTTOM_CENTER, line10.c_str());
       it.print(it.get_width() / 2, it.get_height() / 12 *11 , id(Roboto70), TextAlign::BOTTOM_CENTER, line11.c_str());
       it.print(it.get_width() / 2, it.get_height() , id(Roboto70), TextAlign::BOTTOM_CENTER, line12.c_str());

time:
  - platform: bm8563
    id: rtc_time
    address: 0x51
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      - bm8563.write_time:

touchscreen:
  - platform: gt911
    display: m5paper_display
    id: gt911_touch
    calibration:
      x_min: 0
      x_max: 540
      y_min: 0
      y_max: 960
    on_touch:
      - component.update: m5paper_display

sensor:
  - platform: sht3xd
    address: 0x44
    temperature:
      name: "M5Paper Temperature"
      id: m5paper_temp
    humidity:
      name: "M5Paper Humidity"
      id: m5paper_humidity
    update_interval: 60s
  - platform: adc
    pin: GPIO35
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: '%'
    update_interval: 60s
    lambda: |-
      float voltage = id(battery_voltage).state;
      if (voltage < 3.3) return 0.0;
      if (voltage > 4.2) return 100.0;
      return (voltage - 3.3) / (4.2 - 3.3) * 100.0;
  - platform: template
    name: "HA Message Counter"
    id: ha_counter_sensor
    lambda: |-
      return id(ha_message_counter);
  - platform: wifi_signal
    name: "WiFi Signal"
    id: m5paper_wifi_signal
    update_interval: 60s

binary_sensor:
  - platform: gpio
    name: "Left Button"
    pin:
      number: GPIO37
      inverted: true
    on_press:
      - component.update: m5paper_display
  - platform: gpio
    name: "Push Button"
    pin:
      number: GPIO38
      inverted: true
  - platform: gpio
    name: "Right Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      - component.update: m5paper_display

text_sensor:
  - platform: template
    name: "API Connection Status"
    id: api_status
    lambda: |-
      return api_is_connected() ? "connected" : "disconnected";

font:
  - file: "gfonts://Roboto"
    id: Roboto70
    size: 70
  - file: "gfonts://Roboto"
    id: RobotoSmall
    size: 30

text:
  - platform: template
    name: "Text Line 01"
    id: textline01
    optimistic: true
    min_length: 0
    max_length: 100
    initial_value: 'TEXT 01'
    mode: text
    on_value:
      then:
        - lambda: |-
            id(ha_message_counter) += 1;
            ESP_LOGI("m5paper", "Received Line 01: %s (counter: %d)", x.c_str(), id(ha_message_counter));
        - if:
            condition:
              lambda: 'return id(system_initialized) == true;'
            then:
              - it8951e.updateslow: m5paper_display
